<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="A gallery of videos and images.">
<meta name="keywords" content="gallery, videos, images, media">
<meta name="author" content="Anshita Gupta">

<title>Media Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#e0f7fa,#ffffff,#f3e5f5);
    padding:40px;
}
.container{
    max-width:1200px;
    margin:auto;
}
h1{
    text-align:center;
    color:#333;
    margin-bottom:40px;
    font-size:42px;
}

.section-title{
    font-size:28px;
    color:#444;
    margin:30px 0 20px;
    border-left:6px solid #4CAF50;
    padding-left:12px;
}

.video-gallery,
.image-gallery{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.card{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
    transition:0.3s;
    text-align:center;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

video,
img{
    width:250px;
    height:250px;
    border-radius:12px;
    object-fit:cover;
}

.caption{
    margin-top:12px;
    font-size:18px;
    color:#555;
    font-weight:bold;
}

footer{
    text-align:center;
    margin-top:50px;
    color:#555;
    font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>📸 My Media Gallery 🎥</h1>

<h2 class="section-title">Videos</h2>

<div class="video-gallery">

<div class="card">
<video controls>
<source src="video1.mp4" type="video/mp4">
Your browser does not support the video tag.
</video>
<div class="caption">Video 1</div>
</div>

<div class="card">
<video controls>
<source src="video2.mp4" type="video/mp4">
Your browser does not support the video tag.
</video>
<div class="caption">Video 2</div>
</div>

</div>

<h2 class="section-title">Images</h2>

<div class="image-gallery">

<div class="card">
<img src="C:\Users\Asus\OneDrive\Pictures\IMG20260425183253.jpg" alt="daytime">
<div class="caption">Daytime View</div>
</div>

<div class="card">
<img src="C:\Users\Asus\OneDrive\Pictures\IMG20260419041304.jpg" alt="nighttime">
<div class="caption">Nighttime View</div>
</div>

</div>

<footer>
Made with ❤️ by <strong>Anshita Gupta</strong>
</footer>

</div>

</body>
</html>
